@if (isAddingTask) {
  <app-new-task [userId]="userId" (cancelAddTask)="onCancelAddTask()"></app-new-task>
}

<section id="tasks">
  <header>
    <h2>{{ name }}'s Tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add Task</button>
    </menu>
  </header>
  <ul>
    @for (task of selectedUserTasks; track task.id) {
      <li>
        <app-task-list [task]="task" (taskSelected)="onComplete($event)"></app-task-list>
      </li>
    }
  </ul>
</section>
